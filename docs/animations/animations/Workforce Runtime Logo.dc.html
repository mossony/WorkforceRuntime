<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #f5f4f2; }
    * { box-sizing: border-box; }
  </style>
</helmet>

<div style="min-height:100vh; background:#f5f4f2; font-family:'DM Sans', system-ui, sans-serif; -webkit-font-smoothing:antialiased; padding:72px 64px 120px;">
  <div style="max-width:820px; margin:0 auto;">

    <!-- Header -->
    <div style="display:flex; align-items:baseline; gap:12px; margin-bottom:72px;">
      <span style="font-family:'DM Mono', monospace; font-size:10px; font-weight:400; letter-spacing:.14em; text-transform:uppercase; color:#aaa;">Workforce Runtime</span>
      <span style="font-family:'DM Mono', monospace; font-size:10px; color:#ccc;">/ Brand Mark</span>
    </div>

    <!-- ── PRIMARY MARK ── -->
    <div style="margin-bottom:64px;">
      <div style="font-family:'DM Mono', monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:#bbb; margin-bottom:20px;">Primary</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:3px;">

        <!-- Black bg -->
        <div style="background:#0d0d0d; border-radius:4px 0 0 4px; padding:64px; display:flex; flex-direction:column; align-items:flex-start; gap:32px;">
          <svg viewBox="0 0 56 56" width="56" height="56" fill="none">
            <path d="M10 42V29H46V42" stroke="#7a7a7a" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#7a7a7a" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#ffffff"/>
            <circle cx="10" cy="42" r="5.5" fill="#ffffff"/>
            <circle cx="28" cy="42" r="5.5" fill="#ffffff"/>
            <circle cx="46" cy="42" r="5.5" fill="#ffffff"/>
          </svg>
          <div>
            <div style="font-size:26px; font-weight:600; letter-spacing:-.035em; color:#ffffff; line-height:1.1;">Workforce</div>
            <div style="font-size:26px; font-weight:300; letter-spacing:-.02em; color:rgba(255,255,255,.45); line-height:1.1;">Runtime</div>
          </div>
        </div>

        <!-- White bg -->
        <div style="background:#ffffff; border-radius:0 4px 4px 0; padding:64px; display:flex; flex-direction:column; align-items:flex-start; gap:32px;">
          <svg viewBox="0 0 56 56" width="56" height="56" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <div>
            <div style="font-size:26px; font-weight:600; letter-spacing:-.035em; color:#0d0d0d; line-height:1.1;">Workforce</div>
            <div style="font-size:26px; font-weight:300; letter-spacing:-.02em; color:rgba(0,0,0,.3); line-height:1.1;">Runtime</div>
          </div>
        </div>

      </div>
    </div>

    <!-- ── ICON STANDALONE ── -->
    <div style="margin-bottom:64px;">
      <div style="font-family:'DM Mono', monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:#bbb; margin-bottom:20px;">Icon — standalone</div>
      <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:3px;">

        <!-- App icon dark -->
        <div style="background:#0d0d0d; border-radius:4px; aspect-ratio:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px;">
          <svg viewBox="0 0 56 56" width="64" height="64" fill="none">
            <path d="M10 42V29H46V42" stroke="#7a7a7a" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#7a7a7a" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#ffffff"/>
            <circle cx="10" cy="42" r="5.5" fill="#ffffff"/>
            <circle cx="28" cy="42" r="5.5" fill="#ffffff"/>
            <circle cx="46" cy="42" r="5.5" fill="#ffffff"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:8px; color:#555; letter-spacing:.08em;">Dark</span>
        </div>

        <!-- App icon light -->
        <div style="background:#ffffff; border-radius:4px; aspect-ratio:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px;">
          <svg viewBox="0 0 56 56" width="64" height="64" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:8px; color:#ccc; letter-spacing:.08em;">Light</span>
        </div>

        <!-- Mark bare, on paper -->
        <div style="background:#f5f4f2; border-radius:4px; aspect-ratio:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; outline:1px solid #e5e3e0;">
          <svg viewBox="0 0 56 56" width="64" height="64" fill="none">
            <path d="M10 42V29H46V42" stroke="#b0b0b0" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#b0b0b0" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:8px; color:#bbb; letter-spacing:.08em;">Paper</span>
        </div>

        <!-- Outline (white on dark) -->
        <div style="background:#0d0d0d; border-radius:4px; aspect-ratio:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; outline:1px solid #1e1e1e;">
          <svg viewBox="0 0 56 56" width="64" height="64" fill="none">
            <path d="M10 36.5V29H46V36.5" stroke="#737373" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 18V36.5" stroke="#737373" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
            <circle cx="10" cy="42" r="5.5" fill="none" stroke="#ffffff" stroke-width="2"/>
            <circle cx="28" cy="42" r="5.5" fill="none" stroke="#ffffff" stroke-width="2"/>
            <circle cx="46" cy="42" r="5.5" fill="none" stroke="#ffffff" stroke-width="2"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:8px; color:#555; letter-spacing:.08em;">Outline</span>
        </div>

      </div>
    </div>

    <!-- ── SIZES ── -->
    <div style="margin-bottom:64px;">
      <div style="font-family:'DM Mono', monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:#bbb; margin-bottom:20px;">Sizes</div>
      <div style="background:#ffffff; border-radius:4px; padding:40px 48px; display:flex; align-items:flex-end; gap:40px; flex-wrap:wrap;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
          <svg viewBox="0 0 56 56" width="16" height="16" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:9px; color:#ccc;">16</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
          <svg viewBox="0 0 56 56" width="24" height="24" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:9px; color:#ccc;">24</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
          <svg viewBox="0 0 56 56" width="36" height="36" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:9px; color:#ccc;">36</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
          <svg viewBox="0 0 56 56" width="48" height="48" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:9px; color:#ccc;">48</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
          <svg viewBox="0 0 56 56" width="72" height="72" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:9px; color:#ccc;">72</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
          <svg viewBox="0 0 56 56" width="96" height="96" fill="none">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-family:'DM Mono',monospace; font-size:9px; color:#ccc;">96</span>
        </div>
      </div>
    </div>

    <!-- ── INLINE / COMPACT ── -->
    <div>
      <div style="font-family:'DM Mono', monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:#bbb; margin-bottom:20px;">Inline</div>
      <div style="display:flex; flex-direction:column; gap:3px;">
        <!-- Dark bg inline -->
        <div style="background:#0d0d0d; border-radius:4px 4px 0 0; padding:28px 36px; display:flex; align-items:center; gap:14px;">
          <svg viewBox="0 0 56 56" width="22" height="22" fill="none" style="flex:0 0 auto;">
            <path d="M10 42V29H46V42" stroke="#7a7a7a" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#7a7a7a" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#ffffff"/>
            <circle cx="10" cy="42" r="5.5" fill="#ffffff"/>
            <circle cx="28" cy="42" r="5.5" fill="#ffffff"/>
            <circle cx="46" cy="42" r="5.5" fill="#ffffff"/>
          </svg>
          <span style="font-size:15px; font-weight:500; letter-spacing:-.02em; color:#ffffff;">Workforce</span>
          <span style="font-size:15px; font-weight:300; letter-spacing:-.01em; color:rgba(255,255,255,.35);">Runtime</span>
        </div>
        <!-- White bg inline -->
        <div style="background:#ffffff; border-radius:0 0 4px 4px; padding:28px 36px; display:flex; align-items:center; gap:14px;">
          <svg viewBox="0 0 56 56" width="22" height="22" fill="none" style="flex:0 0 auto;">
            <path d="M10 42V29H46V42" stroke="#aaaaaa" stroke-width="3" fill="none" stroke-linejoin="round"/>
            <path d="M28 12V42" stroke="#aaaaaa" stroke-width="3"/>
            <circle cx="28" cy="12" r="6" fill="#0d0d0d"/>
            <circle cx="10" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="28" cy="42" r="5.5" fill="#0d0d0d"/>
            <circle cx="46" cy="42" r="5.5" fill="#0d0d0d"/>
          </svg>
          <span style="font-size:15px; font-weight:500; letter-spacing:-.02em; color:#0d0d0d;">Workforce</span>
          <span style="font-size:15px; font-weight:300; letter-spacing:-.01em; color:rgba(0,0,0,.3);">Runtime</span>
        </div>
      </div>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
